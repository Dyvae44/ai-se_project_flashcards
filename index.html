<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Dyvae Lopez" />
    <meta
      name="description"
      content="Web app with flashcards to help users learn, remember, and practice coding concepts."
    />
    <meta
      name="keywords"
      content="code flash, flashcards, coding tips, study guide, CSS, HTML"
    />
    <title>Code Flash</title>
    <link rel="stylesheet" href="./assets/css/index.css" />
    <link rel="stylesheet" href="./assets/css/carousel.css" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="page">
    <header class="header">
      <h1 class="header__title">
        <a href="#home" class="header__link">Flash Cards</a>
      </h1>
      <nav class="nav">
        <ul class="nav__links">
          <li><a href="#home" class="nav__link">My Cards</a></li>
          <li><a href="#about" class="nav__link">About</a></li>
        </ul>
      </nav>
    </header>
    <main class="page__main-content">
      <section id="home" class="gallery">
        <h2 class="gallery__title">My Cards</h2>
        <div class="gallery__row">
          <template id="deck-template">
            <li class="card card_color_green">
              <h3 class="card__title"></h3>

              <div class="card__row">
                <p class="card__count"></p>
                <button
                  class="card__delete-btn"
                  type="button"
                  aria-label="Delete card"
                ></button>
              </div>

              <a class="card__link" href="#"></a>
            </li>
          </template>

          <ul class="gallery__list"></ul>
          <button
            class="gallery__new-card-btn"
            type="button"
            aria-label="New card"
          >
            + New Card
          </button>
        </div>
      </section>

      <section id="deck-view" class="gallery">
        <div class="gallery__header">
          <h2 class="gallery__title"></h2>
          <button
            class="gallery__practice-btn"
            type="button"
            aria-label="Practice deck"
          >
            Practice
          </button>
        </div>

        <div class="gallery__row">
          <template id="card-template">
            <li class="card card_color_green">
              <h3 class="card__title"></h3>

              <div class="card__row">
                <button
                  class="card__practice-btn"
                  type="button"
                  aria-label="Practice this card"
                >
                  Practice
                </button>
                <button
                  class="card__delete-btn"
                  type="button"
                  aria-label="Delete card"
                ></button>
              </div>
            </li>
          </template>

          <ul class="gallery__list"></ul>
          <button
            class="gallery__new-card-btn"
            type="button"
            aria-label="New card"
          >
            + New Card
          </button>
        </div>
      </section>

      <section id="about" class="about">
        <h2 class="about__title">About</h2>
        <p class="about__text">
          This app helps with studying coding concepts using flashcards.
        </p>
      </section>
      <section id="not-found" class="not-found">
        <h2 class="not-found__title">404 Not Found</h2>
        <p class="not-found__text">The page is not found!</p>
      </section>
      <section id="carousel" class="carousel">
        <h2 class="carousel__title"></h2>

        <div class="carousel__row">
          <button
            class="carousel__arrow carousel__arrow_left"
            aria-label="Previous card"
          ></button>

          <div class="carousel__card">
            <p class="carousel__card-text">&lt;body&gt;&lt;/body&gt;</p>
          </div>
          <button
            type="button"
            aria-label="Next card"
            class="carousel__arrow carousel__arrow_right"
          ></button>
        </div>
        <button
          type="button"
          aria-label="Flip card"
          class="carousel__flip-btn"
        ></button>
      </section>
    </main>
    <script src="./assets/js/index.js" type="module"></script>
    <footer class="footer">
      <p class="footer__text">&copy; 2026 Code Flash</p>
    </footer>
  </body>
</html>
